name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for f in $(find . -name '*.js' -not -path './node_modules/*'); do
            node -c "$f"
          done

      - name: Smoke test
        run: node index.js plugin list

      - name: Unit tests
        run: npm test
